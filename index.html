<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Bookmarks</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d0d0d">
<link rel="icon" href="./icon-192.png">
<link rel="apple-touch-icon" href="./icon-192.png">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; min-width: 0; }
  html, body { margin:0; padding:0; height:100%; width:100%; overflow-x:hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background:#0d0d0d; color:#f2f2f2;
    height:100vh; overflow:hidden;
    font-size:12px;
  }
  #app { display:flex; flex-direction:column; height:100%; width:100%; max-width:100vw; overflow:hidden; }

  .header {
    flex:0 0 auto; padding:5px 7px; background:#1a1a1a;
    border-bottom:2px solid #ff8c00; font-weight:bold; font-size:12px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }

  .content { flex:1 1 auto; overflow-y:auto; overflow-x:hidden; padding:4px 6px; width:100%; }

  /* ---- generic slim list item ---- */
  button.navitem, .navitem {
    display:block; width:100%; text-align:left; background:#161616; color:#f2f2f2;
    border:1px solid #2a2a2a; border-radius:6px; padding:5px 7px; margin:0 0 3px 0;
    font-size:12px; font-family:inherit; line-height:1.2;
  }
  .navitem:focus { background:#ff8c00; color:#111; outline:none; border-color:#ff8c00; font-weight:bold; }
  .navitem .bm-sub { display:block; font-size:9px; color:#999; font-weight:normal; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; margin-top:1px; }
  .navitem:focus .bm-sub { color:#3a2200; }

  /* ---- home: top category cards -- BIG, rectangular, the visual anchor ---- */
  .cat-tiles-wrap { display:flex; gap:6px; padding:2px 0 7px; width:100%; }
  .cat-tile {
    flex:1 1 0; height:60px; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; border-radius:14px; border:2px solid var(--tc); background:#141414;
    padding:4px 5px; margin:0; position:relative; width:100%;
  }
  .cat-tile:focus { background:var(--tc); }
  .cat-tile .tile-badge {
    position:absolute; top:4px; left:6px; font-size:9px; font-weight:bold;
    background:var(--tc); color:#0d0d0d; width:14px; height:14px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
  }
  .cat-tile:focus .tile-badge { background:#0d0d0d; color:var(--tc); }
  .cat-tile .tile-icon { font-size:22px; font-weight:bold; color:var(--tc); line-height:1; }
  .cat-tile:focus .tile-icon { color:#0d0d0d; }
  .cat-tile .tile-label { font-size:12.5px; font-weight:bold; color:#f2f2f2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
  .cat-tile:focus .tile-label { color:#0d0d0d; }
  .cat-tile .tile-count { font-size:9.5px; color:#888; }
  .cat-tile:focus .tile-count { color:#222; }

  /* ---- home: inline expanded list label ---- */
  .inline-list-label { font-size:9.5px; color:#888; margin:0 0 3px 2px; text-transform:uppercase; letter-spacing:.03em; }

  /* ---- home: app grid -- small, dense, clearly smaller than cat cards ---- */
  .app-grid { display:grid; grid-template-columns:repeat(4, 1fr); gap:6px; padding-top:1px; width:100%; }
  .app-tile {
    aspect-ratio:1/1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2px; border-radius:11px; border:1px solid #2f2f2f; background:#161616; padding:3px;
    position:relative; margin:0; width:100%;
  }
  .app-tile:focus { background:#ff8c00; border-color:#ff8c00; outline:none; }
  .app-tile .app-idx {
    position:absolute; top:2px; left:4px; font-size:8px; color:#666; font-weight:bold;
  }
  .app-tile:focus .app-idx { color:#3a2200; }
  .app-icon-wrap { width:20px; height:20px; border-radius:6px; overflow:hidden; position:relative; background:#333; flex:0 0 auto; }
  .app-favicon { width:20px; height:20px; object-fit:cover; display:block; }
  .app-favicon-fallback {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-weight:bold; font-size:10px; color:#0d0d0d; background:#555;
  }
  .app-tile-label {
    font-size:8px; font-weight:600; color:#ddd; text-align:center; width:100%;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .app-tile:focus .app-tile-label { color:#111; }
  .app-empty-msg { grid-column:1/-1; padding:12px 4px; text-align:center; color:#777; font-size:10.5px; }

  .hint { text-align:center; color:#777; font-size:9.5px; margin-top:7px; padding:0 6px; }

  /* ---- bookmark row with favicon (inline lists) ---- */
  .bm-row { display:flex; align-items:center; gap:6px; width:100%; }
  .icon-wrap { flex:0 0 auto; width:20px; height:20px; border-radius:5px; overflow:hidden; position:relative; background:#333; }
  .favicon { width:20px; height:20px; object-fit:cover; display:block; }
  .favicon-fallback {
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    font-weight:bold; font-size:10px; color:#0d0d0d;
  }
  .bm-name { flex:1 1 auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  .content label { display:block; font-size:10px; color:#999; margin:5px 0 2px; }
  .content input, .content select {
    display:block; width:100%; padding:6px 7px; margin-bottom:1px;
    background:#1a1a1a; border:1px solid #444; color:#fff; border-radius:6px;
    font-size:12px; font-family:inherit;
  }
  .content input:focus, .content select:focus { border-color:#00caf2; outline:none; background:#111; }

  .empty-msg { padding:14px 6px; text-align:center; color:#888; font-size:11px; line-height:1.4; }
  .error-msg { color:#ff6b6b; font-size:10px; min-height:13px; margin-top:3px; }
  .confirm-msg { padding:5px 2px 10px; font-size:12px; line-height:1.35; }

  .footer {
    flex:0 0 auto; display:flex; align-items:center; justify-content:space-between;
    background:#1a1a1a; border-top:1px solid #333; padding:5px 7px; font-size:10px;
  }
  .sk { background:none; border:none; color:#00caf2; font-size:10px; padding:2px 3px; font-family:inherit; }
  .sk:focus { outline:1px dotted #00caf2; }
  .sk-center { color:#777; font-size:9px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "featurePhoneBookmarks_v4";

  // Top-level categories shown as big cards + inline expandable list
  var LIST_CATS = {
    Web:     {label:"Websites", color:"#00caf2", icon:"W"},
    YouTube: {label:"Channels", color:"#ff3b3b", icon:"Y"}
  };
  var LIST_CAT_ORDER = ["Web", "YouTube"];

  var APP_CAT = "Apps";
  var APP_GRID_COLS = 4;
  var ALL_CAT_ORDER = ["Apps", "Web", "YouTube"];

  var DEFAULT_DATA = {
    categories: ALL_CAT_ORDER.slice(),
    bookmarks: [
  {id:"d1", name:"Google", url:"https://www.google.com", category:"Web"},
  {id:"d2", name:"Wikipedia", url:"https://www.wikipedia.org", category:"Web"},
  {id:"d3", name:"BBC News", url:"https://www.bbc.com/news", category:"Web"},
  {id:"d4", name:"Gmail", url:"https://mail.google.com", category:"Web"},
  {id:"d5", name:"X (Twitter)", url:"https://x.com", category:"Apps"},
  {id:"d6", name:"Facebook Lite", url:"https://mbasic.facebook.com", category:"Apps"},
  {id:"d7", name:"Google Maps", url:"https://maps.google.com", category:"Apps"},
  {id:"d8", name:"Spotify Web Player", url:"https://open.spotify.com", category:"Apps"},
  {id:"d9", name:"YouTube Home", url:"https://www.youtube.com", category:"YouTube"},
  {id:"d10", name:"JerryRigEverything", url:"https://www.youtube.com/@JerryRigEverything", category:"YouTube"},
  {id:"d11", name:"Kurzgesagt", url:"https://www.youtube.com/@kurzgesagt", category:"YouTube"},
  {id:"d12", name:"NASA", url:"https://www.youtube.com/@NASA", category:"YouTube"},
  {id:"d13", name:"The Mystic Meditation", url:"https://www.youtube.com/@TheMysticMeditation", category:"YouTube"},
  {id:"d14", name:"Om Swami TV", url:"https://www.youtube.com/@omswamitv", category:"YouTube"},
  {id:"d15", name:"Samadhi Yog Foundation", url:"https://www.youtube.com/@Samadhiyogfoundation", category:"YouTube"},
  {id:"d16", name:"Sadhguru", url:"https://www.youtube.com/@sadhguru", category:"YouTube"},
  {id:"d17", name:"Nrisingha Prasad Bhaduri", url:"https://www.youtube.com/@NrisinghaPrasadBhadurii", category:"YouTube"}
]
  };

  // state.screen: "home" | "form" | "optionsMenu" | "confirm"
  // Home navigation uses a row/column grid model (one unambiguous cursor position),
  // NOT a flat index with an assumed stride -- that's what caused the conflicts before.
  var state = { screen: "home", ctx: {}, data: null, homeRow: 0, homeCol: 0, homeExpandedCat: null };
  var stack = [];

  // ---------- storage ----------
  function clone(o){ return JSON.parse(JSON.stringify(o)); }

  function migrateCategory(name){
    if(name === "Websites") return "Web";
    if(name === "PWAs") return "Apps";
    if(name === "YouTube Channels") return "YouTube";
    if(ALL_CAT_ORDER.indexOf(name) !== -1) return name;
    return "Web";
  }

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw){ state.data = JSON.parse(raw); }
      else {
        var oldRaw = localStorage.getItem("featurePhoneBookmarks_v3") || localStorage.getItem("featurePhoneBookmarks_v2");
        state.data = oldRaw ? JSON.parse(oldRaw) : clone(DEFAULT_DATA);
      }
      if(!state.data.bookmarks) state.data.bookmarks = [];
      state.data.bookmarks.forEach(function(b){ b.category = migrateCategory(b.category); });
      state.data.categories = ALL_CAT_ORDER.slice();
      saveData();
    }catch(e){
      state.data = clone(DEFAULT_DATA);
    }
  }
  function saveData(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }
    catch(e){ console.warn("save failed", e); }
  }

  function genId(){ return "b" + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
  function findBookmark(id){ return state.data.bookmarks.filter(function(b){return b.id===id;})[0]; }
  function bookmarksIn(cat){ return state.data.bookmarks.filter(function(b){return b.category===cat;}); }
  function esc(s){
    return String(s==null?"":s).replace(/[&<>"']/g, function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }
  function hostOf(url){
    try{ return new URL(url).hostname; }catch(e){
      var m = String(url).match(/^https?:\/\/([^\/]+)/i);
      return m ? m[1] : url;
    }
  }
  function faviconUrl(url){
    return "https://www.google.com/s2/favicons?sz=64&domain=" + encodeURIComponent(hostOf(url));
  }

  // ---------- navigation (screens) ----------
  function pushScreen(screen, ctx){
    stack.push({screen: state.screen, ctx: state.ctx});
    state.screen = screen;
    state.ctx = ctx || {};
    render();
  }
  function goBack(){
    if(stack.length === 0){
      if(state.screen === "home"){ tryExit(); }
      else { gotoHome(); }
      return;
    }
    var prev = stack.pop();
    state.screen = prev.screen;
    state.ctx = prev.ctx;
    render();
  }
  function gotoHome(){ stack = []; state.screen = "home"; state.ctx = {}; render(); }

  function tryExit(){ try{ window.close(); }catch(e){} }

  function openURL(url){
    try{
      var w = window.open(url, "_blank");
      if(!w){ location.href = url; }
    }catch(e){ location.href = url; }
  }

  function openConfirm(message, onYes){ pushScreen("confirm", {message: message, onYes: onYes}); }

  // ---------- home grid model ----------
  // Builds an explicit 2D grid of rows (each row = array of items). Row 0 is always
  // the two category cards. Every subsequent row is either one list item (when a
  // category is expanded) or up to APP_GRID_COLS app tiles (when collapsed).
  // This single structure drives rendering, arrow-key movement, AND digit shortcuts,
  // so there is exactly one numbering/position scheme active at any moment.
  function buildHomeRows(){
    var rows = [];
    rows.push(LIST_CAT_ORDER.map(function(key){ return {type:"catTile", cat:key}; }));

    if(state.homeExpandedCat){
      var bms = bookmarksIn(state.homeExpandedCat);
      if(bms.length === 0){
        rows.push([{type:"inlineEmpty"}]);
      } else {
        bms.forEach(function(b){
          rows.push([{type:"inlineBookmark", cat:state.homeExpandedCat, id:b.id}]);
        });
      }
    } else {
      var apps = bookmarksIn(APP_CAT);
      if(apps.length === 0){
        rows.push([{type:"appEmpty"}]);
      } else {
        for(var i=0; i<apps.length; i+=APP_GRID_COLS){
          rows.push(apps.slice(i, i+APP_GRID_COLS).map(function(b){ return {type:"appTile", id:b.id}; }));
        }
      }
    }
    return rows;
  }

  function flattenRows(rows){
    var flat = [];
    rows.forEach(function(row, r){
      row.forEach(function(item, c){ flat.push({row:r, col:c, item:item}); });
    });
    return flat;
  }

  function clampHomeCursor(rows){
    if(rows.length === 0){ state.homeRow = 0; state.homeCol = 0; return; }
    if(state.homeRow >= rows.length) state.homeRow = rows.length - 1;
    if(state.homeRow < 0) state.homeRow = 0;
    var rowLen = rows[state.homeRow].length;
    if(state.homeCol >= rowLen) state.homeCol = rowLen - 1;
    if(state.homeCol < 0) state.homeCol = 0;
  }

  function currentHomeItem(){
    var rows = buildHomeRows();
    clampHomeCursor(rows);
    return rows[state.homeRow][state.homeCol];
  }

  function homeMove(dir){
    var rows = buildHomeRows();
    clampHomeCursor(rows);
    if(dir === "down"){
      if(state.homeRow < rows.length - 1){
        state.homeRow++;
        state.homeCol = Math.min(state.homeCol, rows[state.homeRow].length - 1);
      }
    } else if(dir === "up"){
      if(state.homeRow > 0){
        state.homeRow--;
        state.homeCol = Math.min(state.homeCol, rows[state.homeRow].length - 1);
      }
    } else if(dir === "right"){
      if(state.homeCol < rows[state.homeRow].length - 1){ state.homeCol++; }
    } else if(dir === "left"){
      if(state.homeCol > 0){ state.homeCol--; }
    }
    render();
  }

  function homeDigitSelect(n){
    var rows = buildHomeRows();
    var flat = flattenRows(rows);
    var target = flat[n - 1];
    if(!target) return;
    state.homeRow = target.row;
    state.homeCol = target.col;
    activateHomeItem(target.item);
  }

  function activateHomeItem(item){
    if(!item) return;
    if(item.type === "catTile"){
      // Toggle inline expansion. Row 0 (the two cards) never changes shape,
      // so the cursor position (row/col) stays valid without any lookup.
      state.homeExpandedCat = (state.homeExpandedCat === item.cat) ? null : item.cat;
      render();
    } else if(item.type === "inlineBookmark" || item.type === "appTile"){
      var bm = findBookmark(item.id);
      if(bm) openURL(bm.url);
    }
  }

  function handleOk(){
    if(state.screen === "home"){ activateHomeItem(currentHomeItem()); }
  }

  // ---------- softkey actions (context-dependent) ----------
  function doLeftAction(){
    if(state.screen === "home"){
      var item = currentHomeItem();
      var category = APP_CAT, bookmarkId = null;
      if(item){
        if(item.type === "catTile"){ category = item.cat; bookmarkId = null; }
        else if(item.type === "inlineBookmark"){ category = item.cat; bookmarkId = item.id; }
        else if(item.type === "appTile"){ category = APP_CAT; bookmarkId = item.id; }
        else if(item.type === "inlineEmpty"){ category = state.homeExpandedCat || APP_CAT; bookmarkId = null; }
      }
      pushScreen("optionsMenu", {category: category, bookmarkId: bookmarkId});
    } else if(state.screen === "form"){
      submitForm();
    } else if(state.screen === "confirm"){
      confirmYes();
    }
  }
  function doRightAction(){
    if(state.screen === "home"){ tryExit(); }
    else { goBack(); }
  }

  function confirmYes(){ var cb = state.ctx.onYes; if(cb) cb(); }

  // ---------- mutations ----------
  function deleteBookmark(id){
    var bm = findBookmark(id);
    state.data.bookmarks = state.data.bookmarks.filter(function(b){return b.id!==id;});
    saveData();
    state.homeExpandedCat = (bm && LIST_CAT_ORDER.indexOf(bm.category) !== -1) ? bm.category : null;
    state.homeRow = 0; state.homeCol = 0;
    gotoHome();
  }

  function submitForm(){
    var nameEl = document.getElementById("f-name");
    var urlEl = document.getElementById("f-url");
    var catEl = document.getElementById("f-category");
    var errEl = document.getElementById("f-error");
    var name = nameEl.value.trim();
    var url = urlEl.value.trim();
    var category = catEl ? catEl.value : "";

    if(!name){ errEl.textContent = "Please enter a name."; nameEl.focus(); return; }
    if(!url){ errEl.textContent = "Please enter a URL."; urlEl.focus(); return; }
    if(!category){ errEl.textContent = "Please choose a category."; return; }

    if(!/^https?:\/\//i.test(url)){ url = "https://" + url; }

    if(state.ctx.editId){
      var bm = findBookmark(state.ctx.editId);
      if(bm){ bm.name = name; bm.url = url; bm.category = category; }
    } else {
      state.data.bookmarks.push({id: genId(), name: name, url: url, category: category});
    }
    saveData();
    state.homeExpandedCat = (LIST_CAT_ORDER.indexOf(category) !== -1) ? category : null;
    state.homeRow = 0; state.homeCol = 0;
    gotoHome();
  }

  // ---------- rendering ----------
  function renderHome(){
    var rows = buildHomeRows();
    clampHomeCursor(rows);
    var flat = flattenRows(rows);
    var idxMap = {};
    flat.forEach(function(f, i){ if(i < 9) idxMap[f.row+"-"+f.col] = i+1; });

    var tilesHtml = LIST_CAT_ORDER.map(function(key, c){
      var meta = LIST_CATS[key];
      var count = bookmarksIn(key).length;
      var badge = idxMap["0-"+c];
      return '<button class="cat-tile navitem" data-action="homeSelect" data-row="0" data-col="' + c + '" data-cat="' + key + '" style="--tc:' + meta.color + '">' +
        (badge ? '<span class="tile-badge">' + badge + '</span>' : '') +
        '<span class="tile-icon">' + meta.icon + '</span>' +
        '<span class="tile-label">' + esc(meta.label) + '</span>' +
        '<span class="tile-count">' + count + '</span>' +
      '</button>';
    }).join("");

    var lowerHtml;
    if(state.homeExpandedCat){
      var meta2 = LIST_CATS[state.homeExpandedCat];
      var bms = bookmarksIn(state.homeExpandedCat);
      var rowsHtml;
      if(bms.length === 0){
        rowsHtml = '<div class="empty-msg">No ' + esc(meta2.label.toLowerCase()) + ' yet.<br>Press "Options" to add one.</div>';
      } else {
        rowsHtml = bms.map(function(b, i){
          var r = i + 1, c = 0;
          var badge = idxMap[r+"-"+c];
          var letter = esc((b.name || "?").charAt(0).toUpperCase());
          var fav = faviconUrl(b.url);
          var host = esc(hostOf(b.url));
          return '<button class="navitem" data-action="openBookmark" data-row="' + r + '" data-col="' + c + '" data-url="' + esc(b.url) + '" data-id="' + esc(b.id) + '">' +
            '<span class="bm-row">' +
              '<span class="icon-wrap" style="background:' + meta2.color + '">' +
                '<img class="favicon" src="' + esc(fav) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
                '<span class="favicon-fallback" style="display:none;">' + letter + '</span>' +
              '</span>' +
              '<span class="bm-name">' + (badge ? badge + '. ' : '') + esc(b.name) + '<span class="bm-sub">' + host + '</span></span>' +
            '</span>' +
          '</button>';
        }).join("");
      }
      lowerHtml = '<div class="inline-list-label">' + esc(meta2.label) + '</div>' + rowsHtml;
    } else {
      var apps = bookmarksIn(APP_CAT);
      var gridHtml;
      if(apps.length === 0){
        gridHtml = '<div class="app-empty-msg">No apps yet. Press "Options" to add one.</div>';
      } else {
        gridHtml = apps.map(function(b, i){
          var r = 1 + Math.floor(i / APP_GRID_COLS), c = i % APP_GRID_COLS;
          var badge = idxMap[r+"-"+c];
          var letter = esc((b.name || "?").charAt(0).toUpperCase());
          var fav = faviconUrl(b.url);
          return '<button class="app-tile navitem" data-action="openBookmark" data-row="' + r + '" data-col="' + c + '" data-url="' + esc(b.url) + '" data-id="' + esc(b.id) + '">' +
            (badge ? '<span class="app-idx">' + badge + '</span>' : '') +
            '<span class="app-icon-wrap">' +
              '<img class="app-favicon" src="' + esc(fav) + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\';">' +
              '<span class="app-favicon-fallback" style="display:none;">' + letter + '</span>' +
            '</span>' +
            '<span class="app-tile-label">' + esc(b.name) + '</span>' +
          '</button>';
        }).join("");
      }
      lowerHtml = '<div class="app-grid">' + gridHtml + '</div>';
    }

    return '<div class="header">Bookmarks</div>' +
      '<div class="content">' +
        '<div class="cat-tiles-wrap">' + tilesHtml + '</div>' +
        lowerHtml +
        '<div class="hint">Arrows: move &middot; OK: open/expand</div>' +
      '</div>' +
      '<div class="footer">' +
        '<button class="sk" data-action="softLeft">Options</button>' +
        '<span class="sk-center">OK: Open</span>' +
        '<button class="sk" data-action="softRight">Exit</button>' +
      '</div>';
  }

  function renderForm(){
    var editing = !!state.ctx.editId;
    var bm = editing ? findBookmark(state.ctx.editId) : null;
    var name = bm ? bm.name : "";
    var url = bm ? bm.url : "";
    var preCat = bm ? bm.category : (state.ctx.category || "");

    var catOptionsHtml = "";
    if(!preCat){
      catOptionsHtml += '<option value="" disabled selected>-- choose category --</option>';
    }
    catOptionsHtml += ALL_CAT_ORDER.map(function(key){
      var label = LIST_CATS[key] ? LIST_CATS[key].label : key;
      return '<option value="' + key + '"' + (key===preCat?' selected':'') + '>' + esc(label) + '</option>';
    }).join("");

    return '<div class="header">' + (editing ? "Edit" : "Add") + ' Bookmark</div>' +
      '<div class="content">' +
        '<label>Name</label>' +
        '<input id="f-name" type="text" value="' + esc(name) + '" placeholder="e.g. Google">' +
        '<label>URL</label>' +
        '<input id="f-url" type="text" value="' + esc(url) + '" placeholder="example.com">' +
        '<label>Category</label>' +
        '<select id="f-category">' + catOptionsHtml + '</select>' +
        '<div id="f-error" class="error-msg"></div>' +
      '</div>' +
      '<div class="footer">' +
        '<button class="sk" data-action="softLeft">Save</button>' +
        '<span class="sk-center"></span>' +
        '<button class="sk" data-action="softRight">Cancel</button>' +
      '</div>';
  }

  function renderOptionsMenu(){
    var ctx = state.ctx;
    var opts = [];
    opts.push(["Add Bookmark", "goAddBookmark", {cat: ctx.category || ""}]);
    if(ctx.bookmarkId){
      opts.push(["Edit Bookmark", "goEditBookmark", {id: ctx.bookmarkId}]);
      opts.push(["Delete Bookmark", "goDeleteBookmark", {id: ctx.bookmarkId}]);
    }
    var itemsHtml = opts.map(function(o){
      var label = o[0], action = o[1], data = o[2];
      var dataAttrs = Object.keys(data).map(function(k){ return 'data-' + k + '="' + esc(data[k]) + '"'; }).join(" ");
      return '<button class="navitem" data-action="' + action + '" ' + dataAttrs + '>' + esc(label) + '</button>';
    }).join("");
    return '<div class="header">Options</div>' +
      '<div class="content">' + itemsHtml + '</div>' +
      '<div class="footer">' +
        '<span class="sk"></span>' +
        '<span class="sk-center">OK: Select</span>' +
        '<button class="sk" data-action="softRight">Back</button>' +
      '</div>';
  }

  function renderConfirm(){
    var msg = state.ctx.message;
    return '<div class="header">Confirm</div>' +
      '<div class="content">' +
        '<div class="confirm-msg">' + esc(msg) + '</div>' +
        '<button class="navitem" data-action="confirmNo">No, cancel</button>' +
        '<button class="navitem" data-action="confirmYes">Yes, continue</button>' +
      '</div>' +
      '<div class="footer">' +
        '<button class="sk" data-action="softLeft">Yes</button>' +
        '<span class="sk-center"></span>' +
        '<button class="sk" data-action="softRight">No</button>' +
      '</div>';
  }

  var SCREEN_RENDERERS = {
    home: renderHome,
    form: renderForm,
    optionsMenu: renderOptionsMenu,
    confirm: renderConfirm
  };

  function render(){
    document.getElementById("app").innerHTML = SCREEN_RENDERERS[state.screen]();
    focusCurrent();
  }

  function focusCurrent(){
    if(state.screen === "home"){
      var el = document.querySelector('#app .content [data-row="' + state.homeRow + '"][data-col="' + state.homeCol + '"]');
      if(el){ el.focus(); if(el.scrollIntoView) el.scrollIntoView({block:"nearest"}); return; }
    }
    var items = document.querySelectorAll("#app .content .navitem, #app .content input, #app .content select");
    if(items.length){ items[0].focus(); }
  }

  // Generic linear focus movement for non-home screens (form / optionsMenu / confirm)
  function moveFocusLinear(dir){
    var items = Array.prototype.slice.call(
      document.querySelectorAll("#app .content .navitem, #app .content input, #app .content select")
    );
    if(items.length === 0) return;
    var idx = items.indexOf(document.activeElement);
    if(idx === -1){ idx = 0; } else { idx = (idx + dir + items.length) % items.length; }
    items[idx].focus();
    if(items[idx].scrollIntoView){ items[idx].scrollIntoView({block: "nearest"}); }
  }

  // ---------- event delegation ----------
  document.addEventListener("DOMContentLoaded", function(){
    loadData();
    render();

    document.getElementById("app").addEventListener("click", function(e){
      var btn = e.target.closest ? e.target.closest("[data-action]") : null;
      if(!btn) return;
      var action = btn.dataset.action;
      var bm;
      switch(action){
        case "homeSelect":
          state.homeRow = Number(btn.dataset.row);
          state.homeCol = Number(btn.dataset.col);
          activateHomeItem({type:"catTile", cat: btn.dataset.cat});
          break;
        case "openBookmark":
          if(btn.dataset.row !== undefined && state.screen === "home"){
            state.homeRow = Number(btn.dataset.row);
            state.homeCol = Number(btn.dataset.col);
          }
          openURL(btn.dataset.url);
          break;
        case "softLeft": doLeftAction(); break;
        case "softRight": doRightAction(); break;
        case "goAddBookmark": pushScreen("form", {editId: null, category: btn.dataset.cat || ""}); break;
        case "goEditBookmark":
          bm = findBookmark(btn.dataset.id);
          if(bm) pushScreen("form", {editId: bm.id, category: bm.category});
          break;
        case "goDeleteBookmark":
          bm = findBookmark(btn.dataset.id);
          if(bm) openConfirm('Delete "' + bm.name + '"?', function(){ deleteBookmark(bm.id); });
          break;
        case "confirmYes": confirmYes(); break;
        case "confirmNo": goBack(); break;
      }
    });

    document.addEventListener("keydown", function(e){
      var ae = document.activeElement;
      var tag = ae ? ae.tagName : "";
      var inText = (tag === "INPUT" || tag === "TEXTAREA");
      var inSelect = (tag === "SELECT");

      switch(e.key){
        case "SoftLeft":
          e.preventDefault(); doLeftAction(); break;
        case "SoftRight":
          e.preventDefault(); doRightAction(); break;
        case "Escape":
          e.preventDefault(); doRightAction(); break;
        case "Backspace":
          if(!inText){ e.preventDefault(); doRightAction(); }
          break;
        case "ArrowDown":
          if(inSelect) break;
          e.preventDefault();
          if(state.screen === "home"){ homeMove("down"); } else { moveFocusLinear(1); }
          break;
        case "ArrowUp":
          if(inSelect) break;
          e.preventDefault();
          if(state.screen === "home"){ homeMove("up"); } else { moveFocusLinear(-1); }
          break;
        case "ArrowRight":
          if(inSelect) break;
          if(inText) break;
          e.preventDefault();
          if(state.screen === "home"){ homeMove("right"); } else { moveFocusLinear(1); }
          break;
        case "ArrowLeft":
          if(inSelect) break;
          if(inText) break;
          e.preventDefault();
          if(state.screen === "home"){ homeMove("left"); } else { moveFocusLinear(-1); }
          break;
        case "Enter":
          if(inSelect){ e.preventDefault(); moveFocusLinear(1); break; }
          if(state.screen === "home" && !inText){ e.preventDefault(); handleOk(); }
          break;
        default:
          if(state.screen === "home" && !inText && !inSelect && /^[1-9]$/.test(e.key)){
            homeDigitSelect(Number(e.key));
          }
      }
    });

    if("serviceWorker" in navigator){
      navigator.serviceWorker.register("./sw.js").catch(function(){});
    }
  });
})();
</script>
</body>
</html>
